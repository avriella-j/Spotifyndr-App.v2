{% extends "base.html" %}
<!-- templates/settings.html — Account settings and danger zone -->

{% block title %}Settings - Spotifyndr{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/settings.css') }}">
{% endblock %}

{% block content %}
<div class="settings-page">
    <h1>Settings</h1>
    
    <!-- Profile settings form -->
    <form id="settings-form">
        <div class="form-group">
            <label for="display-name">Display Name</label>
            <input type="text" id="display-name" name="display_name" value="{{ current_user.display_name }}">
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ current_user.email }}">
        </div>
        
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="3">{{ current_user.bio or '' }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    
    <!-- Irreversible account actions -->
    <div class="danger-zone">
        <h2>Danger Zone</h2>
        <button class="btn btn-danger" id="delete-account">Delete Account</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/pages/settings.js') }}"></script>
{% endblock %}
